{% extends 'flatpages/default.html' %}

{% block title %}Удаление новости{% endblock %}

{% block content %}
    <h1>Удаление новости</h1>
    
    <p>Вы уверены, что хотите удалить новость "{{ object.title }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'news_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
