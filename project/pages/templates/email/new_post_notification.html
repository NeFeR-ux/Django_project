<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Новая статья в категории "{{ category.name }}"</h2>

    <h3>{{ post.title }}</h3>
    <p>{{ post.text|truncatechars:200 }}</p>

    <p>
        <a href="http://127.0.0.1:8000{% url 'news_detail' post.id %}">
            Читать полностью
        </a>
    </p>

    <hr>
    <p>Вы получили это письмо, потому что подписаны на категорию "{{ category.name }}"</p>
</body>
</html>
